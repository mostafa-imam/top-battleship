<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Battleship</title>
  </head>
  <body>
    <div class="wrapper">
      <h1 class="project-name">Battleship</h1>

      <div class="buttons-container">
        <button class="button random-button">Randomize</button>
        <button class="button play-again-button">Play Again?</button>
      </div>

      <div class="messages">You Win</div>

      <div class="gameboard-container player-gameboard-container">
        <h2 class="player-title title">Your Fleet</h2>
        <div class="gameboard player-gameboard">
          <div class="box player-box" data-coordinates="1,1">[1,1]</div>
          <div class="box player-box" data-coordinates="1,2">[1,2]</div>
        </div>
      </div>

      <div class="gameboard-container computer-gameboard-container">
        <h2 class="computer-title title">Enemy Waters</h2>
        <div class="gameboard computer-gameboard">
          <div class="box computer-box" data-coordinates="1,1">[1,1]</div>
          <div class="box computer-box" data-coordinates="1,2">[1,2]</div>
        </div>
      </div>
    </div>
  </body>
</html>
